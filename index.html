<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#020617,#111827,#1f2937);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* CARD PRINCIPAL */

.card{
background:linear-gradient(180deg,#0f172a,#020617);
border-radius:24px;
padding:30px;
box-shadow:0 30px 80px rgba(0,0,0,0.9);
text-align:center;
border:1px solid rgba(255,255,255,0.08);
}

/* BADGE */

.badge{
background:linear-gradient(90deg,#22c55e,#4ade80);
padding:6px 16px;
border-radius:50px;
font-size:12px;
font-weight:bold;
display:inline-block;
margin-bottom:15px;
}

/* TITULO PRINCIPAL */

.brand{
font-size:38px;
font-weight:900;
background:linear-gradient(90deg,#facc15,#f97316,#ef4444);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

/* SUB */

.subtitle{
font-size:14px;
color:#9ca3af;
margin-bottom:20px;
}

/* PREÇO BOX */

.price-box{
background:#020617;
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.old{
text-decoration:line-through;
color:#6b7280;
font-size:14px;
}

.new{
font-size:42px;
font-weight:900;
color:#22c55e;
margin-top:5px;
}

/* BENEFICIOS */

.list{
text-align:left;
margin-bottom:25px;
}

.list div{
margin-bottom:10px;
font-size:14px;
}

/* BOTÃO */

.cta{
display:block;
background:linear-gradient(90deg,#22c55e,#16a34a);
padding:18px;
border-radius:14px;
font-size:18px;
font-weight:900;
text-decoration:none;
color:white;
box-shadow:0 15px 50px rgba(34,197,94,0.5);
transition:0.3s;
}

.cta:hover{
transform:scale(1.06);
box-shadow:0 20px 60px rgba(34,197,94,0.8);
}

/* ALERTA */

.timer{
background:rgba(239,68,68,0.1);
color:#f87171;
padding:12px;
border-radius:10px;
font-size:13px;
margin-top:15px;
font-weight:bold;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#6b7280;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="badge">🔥 LIBERADO AGORA</div>

<div class="brand">MEGA FEIRÃO</div>

<div class="subtitle">
Oferta exclusiva por tempo limitado
</div>

<div class="price-box">
<div class="old">De R$ 7.865,00</div>
<div class="new">R$ 79,97</div>
</div>

<div class="list">
<div>✔ Desconto especial liberado</div>
<div>✔ Acesso imediato após pagamento</div>
<div>✔ Suporte garantido</div>
</div>

<a class="cta" href="https://fyallglowka658-stack.github.io/megapromocoesfeirao2026/inicio/">
GARANTIR AGORA →
</a>

<div class="timer">
⚠ Últimas vagas disponíveis
</div>

<div class="footer">
🔒 Ambiente seguro • Compra protegida
</div>

</div>

</div>

</body>
</html>
